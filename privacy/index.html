document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tyle=\"max-width:760px;\">\n      <p style=\"font-size:16px; line-height:1.7; color:var(--mist); margin:0 0 40px; padding-bottom:32px; border-bottom:1px solid var(--line);\">{{ t.intro }}<\u002Fp>\n      <sc-for list=\"{{ sections }}\" as=\"sec\" hint-placeholder-count=\"11\">\n        <section id=\"sec-{{ sec.num }}\" style=\"margin-bottom:44px; scroll-margin-top:100px;\">\n          <h2 style=\"font-family:'Outfit',sans-serif; font-weight:600; font-size:24px; letter-spacing:-0.02em; margin:0 0 16px; display:flex; gap:12px;\"><span style=\"color:var(--pulse); font-family:'JetBrains Mono',monospace; font-size:18px;\">{{ sec.num }}<\u002Fspan><span>{{ sec.title }}<\u002Fspan><\u002Fh2>\n          <sc-for list=\"{{ sec.paras }}\" as=\"p\" hint-placeholder-count=\"2\">\n            <p style=\"font-size:16px; line-height:1.75; color:var(--mist); margin:0 0 14px;\">{{ p }}<\u002Fp>\n          <\u002Fsc-for>\n        <\u002Fsection>\n      <\u002Fsc-for>\n      <div style=\"margin-top:48px; padding:28px; background:var(--carbon); border:1px solid var(--line); border-radius:16px;\">\n        <div style=\"font-family:'Outfit',sans-serif; font-weight:600; font-size:18px; margin-bottom:8px;\">{{ t.contactTitle }}<\u002Fdiv>\n        <p style=\"font-size:15px; line-height:1.7; color:var(--mist); margin:0;\">{{ t.contactBody }} <a href=\"mailto:privacy@trysubbly.com\" style=\"color:var(--pulse);\">privacy@trysubbly.com<\u002Fa><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fdiv>\n\n  <footer style=\"border-top:1px solid var(--line); background:var(--carbon); padding:40px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:16px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--mist);\">\n    <span>© 2026 Subbly · {{ t.rights }}<\u002Fspan>\n    <div style=\"display:flex; gap:24px;\">\n      <a href=\"termos.html\">{{ t.fTerms }}<\u002Fa>\n      <a href=\"privacidade.html\" style=\"color:var(--pulse);\">{{ t.fPrivacy }}<\u002Fa>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { lang: 'pt' };\n  renderVals() {\n    const data = {\n      pt: {\n        langBtn: 'EN', back: '← Voltar', kicker: 'Legal', title: 'Política de Privacidade', updated: 'Última atualização: 1 de Julho de 2026',\n        indexLabel: 'ÍNDICE',\n        intro: 'Esta Política de Privacidade descreve como o Subbly (“nós”) coleta, usa, compartilha e protege dados pessoais ao fornecer seu aplicativo de assinaturas na plataforma Shopify. Estamos comprometidos com a Lei Geral de Proteção de Dados (LGPD, Lei nº 13.709/2018) e, quando aplicável, com o GDPR.',\n        contactTitle: 'Exercer seus direitos ou tirar dúvidas?', contactBody: 'Fale com nosso Encarregado de Dados (DPO) em',\n        rights: 'Todos os direitos reservados.', fTerms: 'Termos de Serviço', fPrivacy: 'Política de Privacidade',\n        sections: [\n          { num: '01', title: 'Quem Somos', paras: ['O Subbly é um aplicativo de gestão de assinaturas para lojas Shopify. Atuamos como operador de dados em relação aos dados dos clientes finais das lojas, sendo o Comerciante o controlador desses dados. Em relação aos dados de cadastro do próprio Comerciante, atuamos como controlador.'] },\n          { num: '02', title: 'Dados que Coletamos', paras: ['Dados do Comerciante: nome, e-mail, dados da loja Shopify e informações de faturamento necessárias à prestação do serviço.', 'Dados de clientes finais (tratados em nome do Comerciante): nome, e-mail, endereço de entrega, histórico de pedidos e assinaturas, e dados necessários à cobrança recorrente — sem armazenar números completos de cartão, que trafegam diretamente pelos gateways.', 'Dados técnicos: logs de acesso, endereço IP, identificadores de dispositivo e dados de uso para segurança e melhoria do serviço.'] },\n          { num: '03', title: 'Como Usamos os Dados', paras: ['Utilizamos os dados para: operar as assinaturas e cobranças recorrentes; fornecer o portal de autoatendimento; gerar relatórios e analytics ao Comerciante; prestar suporte; garantir segurança e prevenir fraudes; e cumprir obrigações legais.', 'Não vendemos dados pessoais a terceiros.'] },\n          { num: '04', title: 'Bases Legais (LGPD)', paras: ['Tratamos dados com fundamento em: execução de contrato; cumprimento de obrigação legal ou regulatória; legítimo interesse (para segurança e melhoria do serviço); e consentimento, quando exigido.', 'O Comerciante é responsável por obter o consentimento de seus clientes finais quando essa for a base legal aplicável.'] },\n          { num: '05', title: 'Compartilhamento', paras: ['Compartilhamos dados apenas com: a Shopify (plataforma base); gateways e processadores de pagamento; provedores de infraestrutura em nuvem; e ferramentas de comunicação, estritamente para operar o serviço.', 'Todos os subprocessadores estão sujeitos a obrigações contratuais de proteção de dados compatíveis com esta Política.'] },\n          { num: '06', title: 'Transferência Internacional', paras: ['Nossos servidores e alguns subprocessadores podem estar localizados fora do Brasil. Quando houver transferência internacional, adotamos as salvaguardas exigidas pela LGPD, como cláusulas contratuais padrão e garantias de nível de proteção adequado.'] },\n          { num: '07', title: 'Retenção de Dados', paras: ['Mantemos os dados pelo tempo necessário ao cumprimento das finalidades descritas e das obrigações legais. Após a desinstalação do aplicativo, os dados do Comerciante e de seus clientes são excluídos ou anonimizados em prazo razoável, salvo obrigação legal de retenção.', 'Conforme as exigências da Shopify, atendemos a solicitações de exclusão de dados (data redaction) de clientes e lojas.'] },\n          { num: '08', title: 'Segurança', paras: ['Adotamos medidas técnicas e organizacionais para proteger os dados, incluindo criptografia em trânsito e em repouso, controles de acesso, monitoramento e auditorias. Nenhum sistema é 100% imune, mas trabalhamos continuamente para mitigar riscos.'] },\n          { num: '09', title: 'Seus Direitos', paras: ['Nos termos da LGPD, você e os titulares têm direito a: confirmação e acesso aos dados; correção; anonimização ou eliminação; portabilidade; informação sobre compartilhamentos; e revogação de consentimento.', 'Para exercer esses direitos, entre em contato com nosso DPO. Clientes finais devem, preferencialmente, contatar o Comerciante (controlador), e o auxiliaremos conforme necessário.'] },\n          { num: '10', title: 'Cookies e Rastreamento', paras: ['O painel administrativo do Subbly utiliza cookies essenciais para autenticação e funcionamento. Não utilizamos cookies de publicidade. O widget exibido na loja do Comerciante segue as configurações de cookies da própria loja.'] },\n          { num: '11', title: 'Alterações desta Política', paras: ['Podemos atualizar esta Política periodicamente. Alterações materiais serão comunicadas por e-mail ou dentro do aplicativo. A data de “última atualização” no topo indica a versão vigente.'] },\n          { num: '12', title: 'Encarregado de Dados (DPO)', paras: ['Você pode contatar nosso Encarregado pelo Tratamento de Dados Pessoais para qualquer questão relacionada a privacidade pelo e-mail privacy@trysubbly.com. Responderemos dentro dos prazos legais.'] },\n        ],\n      },\n      en: {\n        langBtn: 'PT', back: '← Back', kicker: 'Legal', title: 'Privacy Policy', updated: 'Last updated: July 1, 2026',\n        indexLabel: 'INDEX',\n        intro: 'This Privacy Policy describes how Subbly (“we”) collects, uses, shares and protects personal data when providing its subscription app on the Shopify platform. We are committed to Brazil’s LGPD (Law No. 13.709/2018) and, where applicable, the GDPR.',\n        contactTitle: 'Exercise your rights or have questions?', contactBody: 'Contact our Data Protection Officer (DPO) at',\n        rights: 'All rights reserved.', fTerms: 'Terms of Service', fPrivacy: 'Privacy Policy',\n        sections: [\n          { num: '01', title: 'Who We Are', paras: ['Subbly is a subscription-management app for Shopify stores. We act as data processor regarding the stores’ end-customer data, with the Merchant being the controller of that data. Regarding the Merchant’s own account data, we act as controller.'] },\n          { num: '02', title: 'Data We Collect', paras: ['Merchant data: name, email, Shopify store details and billing information needed to provide the service.', 'End-customer data (processed on the Merchant’s behalf): name, email, shipping address, order and subscription history, and data needed for recurring billing — we do not store full card numbers, which flow directly through the gateways.', 'Technical data: access logs, IP address, device identifiers and usage data for security and service improvement.'] },\n          { num: '03', title: 'How We Use Data', paras: ['We use data to: operate subscriptions and recurring charges; provide the self-service portal; generate reports and analytics for the Merchant; provide support; ensure security and prevent fraud; and comply with legal obligations.', 'We do not sell personal data to third parties.'] },\n          { num: '04', title: 'Legal Bases (LGPD/GDPR)', paras: ['We process data based on: performance of a contract; compliance with legal or regulatory obligations; legitimate interest (for security and service improvement); and consent, where required.', 'The Merchant is responsible for obtaining end-customer consent when that is the applicable legal basis.'] },\n          { num: '05', title: 'Data Sharing', paras: ['We share data only with: Shopify (the underlying platform); payment gateways and processors; cloud infrastructure providers; and communication tools, strictly to operate the service.', 'All sub-processors are subject to contractual data-protection obligations consistent with this Policy.'] },\n          { num: '06', title: 'International Transfer', paras: ['Our servers and some sub-processors may be located outside Brazil. Where international transfer occurs, we adopt the safeguards required by the LGPD, such as standard contractual clauses and adequate-protection guarantees.'] },\n          { num: '07', title: 'Data Retention', paras: ['We retain data for as long as necessary to fulfill the described purposes and legal obligations. After the app is uninstalled, Merchant and customer data are deleted or anonymized within a reasonable period, unless legal retention is required.', 'Per Shopify’s requirements, we honor customer and shop data-redaction requests.'] },\n          { num: '08', title: 'Security', paras: ['We adopt technical and organizational measures to protect data, including encryption in transit and at rest, access controls, monitoring and audits. No system is 100% immune, but we continuously work to mitigate risks.'] },\n          { num: '09', title: 'Your Rights', paras: ['Under the LGPD/GDPR, you and data subjects have the right to: confirmation and access; correction; anonymization or deletion; portability; information about sharing; and withdrawal of consent.', 'To exercise these rights, contact our DPO. End customers should preferably contact the Merchant (controller), and we will assist as needed.'] },\n          { num: '10', title: 'Cookies and Tracking', paras: ['The Subbly admin dashboard uses essential cookies for authentication and operation. We do not use advertising cookies. The widget shown in the Merchant’s store follows the store’s own cookie settings.'] },\n          { num: '11', title: 'Changes to this Policy', paras: ['We may update this Policy periodically. Material changes will be communicated by email or within the app. The “last updated” date at the top indicates the current version.'] },\n          { num: '12', title: 'Data Protection Officer (DPO)', paras: ['You may contact our Data Protection Officer for any privacy-related matter at privacy@trysubbly.com. We will respond within legal timeframes.'] },\n        ],\n      },\n    };\n    const d = data[this.state.lang];\n    return {\n      t: d,\n      sections: d.sections,\n      toggleLang: () => this.setState(s => ({ lang: s.lang === 'pt' ? 'en' : 'pt' })),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
